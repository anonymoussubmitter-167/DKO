# =============================================================================
# DKO Experiment: ESOL (Aqueous Solubility)
# =============================================================================
#
# Dataset: ESOL (Delaney)
# Task: Regression (log solubility in mol/L)
# Size: ~1,128 molecules
# Metric: RMSE, MAE, R2
#
# =============================================================================

experiment:
  name: dko_esol
  description: "DKO model on ESOL aqueous solubility dataset"
  tags: ["dko", "esol", "regression", "solubility"]

dataset:
  name: esol
  task: regression
  split_method: scaffold
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

conformer:
  num_conformers: 20
  max_conformers: 50
  energy_window: 10.0
  optimize: true
  method: mmff

features:
  descriptor_type: rdkit_2d
  normalize: true
  use_3d_features: true

model:
  type: dko
  dko:
    output_dim: 1
    pca_components: 50
    kernel_hidden_dims: [256, 128]
    predictor_hidden_dims: [128, 64]
    dropout: 0.1
    use_batch_norm: true
    psd_method: eigenvalue_clipping

training:
  optimizer: adamw
  base_learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine_annealing
  min_learning_rate: 1.0e-6
  max_epochs: 300
  batch_size: 32
  early_stopping_patience: 30
  gradient_clip_max_norm: 1.0
  mixed_precision: true
  save_every_n_epochs: 10
  seed: 42

evaluation:
  metrics:
    regression: [rmse, mae, r2, spearman]
  n_splits: 5

logging:
  use_wandb: false
  wandb_project: dko-esol
  save_attention_weights: true
  save_predictions: true

hardware:
  device: cuda
  num_workers: 4
  pin_memory: true
