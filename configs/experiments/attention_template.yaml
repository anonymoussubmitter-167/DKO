# =============================================================================
# Attention Baseline Experiment Configuration Template
# =============================================================================
#
# Capacity-matched attention baseline for comparison with DKO.
# Uses learnable attention weights instead of Boltzmann weights.
#
# =============================================================================

experiment:
  name: attention_template
  description: "Attention pooling baseline experiment"
  tags: ["attention", "baseline", "benchmark"]

dataset:
  name: lipophilicity
  task: regression
  split_method: scaffold
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

conformer:
  num_conformers: 20
  max_conformers: 50
  energy_window: 10.0
  optimize: true
  method: mmff

features:
  descriptor_type: rdkit_2d
  normalize: true
  use_3d_features: true

model:
  type: attention

  # Attention-specific settings
  attention:
    feature_dim: null  # Auto-set from features
    output_dim: 1
    embed_dim: 128
    qkv_dim: 128
    num_heads: 4
    num_attention_layers: 2
    prediction_hidden_dim: 128
    dropout: 0.1
    use_layer_norm: true

    # Capacity matching (optional)
    # If target_params is set, model will be resized to match
    target_params: null  # Set to match DKO parameter count

training:
  optimizer: adamw
  base_learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine_annealing
  min_learning_rate: 1.0e-6
  max_epochs: 300
  batch_size: 32
  early_stopping_patience: 30
  gradient_clip_max_norm: 1.0
  mixed_precision: true
  save_every_n_epochs: 10
  seed: 42

evaluation:
  metrics:
    regression: [rmse, mae, r2, spearman]
    classification: [auroc, auprc, accuracy, f1]
  n_splits: 5

logging:
  use_wandb: false
  wandb_project: dko-experiments
  save_attention_weights: true
  save_predictions: true

hardware:
  device: cuda
  num_workers: 4
  pin_memory: true
