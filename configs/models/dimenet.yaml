# DimeNet++ model configuration
# Directional message passing neural network

name: "DimeNet++"
description: |
  DimeNet++: An improved version of the Directional Message Passing
  Neural Network. Incorporates directional information through
  angles and uses efficient implementations.

architecture:
  # Embedding dimensions
  hidden_channels: 128
  out_channels: 1

  # Message passing
  num_blocks: 4
  num_bilinear: 8
  num_spherical: 7
  num_radial: 6

  # Cutoffs
  cutoff: 5.0  # Angstroms
  envelope_exponent: 5

  # Basis functions
  num_before_skip: 1
  num_after_skip: 2
  num_output_layers: 3

  # Output aggregation
  output_aggregation: "sum"  # or "mean"

  # Conformer ensemble handling
  conformer_aggregation:
    method: "mean"
    use_attention: false

hyperparameter_search:
  learning_rate:
    type: "log_uniform"
    low: 1.0e-5
    high: 1.0e-3

  hidden_channels:
    type: "categorical"
    choices: [64, 128, 256]

  num_blocks:
    type: "int"
    low: 2
    high: 6

  num_bilinear:
    type: "categorical"
    choices: [4, 8, 16]

  cutoff:
    type: "categorical"
    choices: [4.0, 5.0, 6.0, 8.0]

  num_radial:
    type: "categorical"
    choices: [4, 6, 8]

training:
  batch_size: 16  # DimeNet is memory intensive
  base_learning_rate: 1.0e-4
  max_epochs: 500
  gradient_clip_max_norm: 10.0
